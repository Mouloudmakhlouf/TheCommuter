<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniCommute Pro: Logistics & Finance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-card">
    <h1>🚗 UniCommute Pro</h1>
    <p>Live Logistics & Expense Tracker</p>

    <div class="section-box">
      <h3>1. Route Selection</h3>
      <div class="flex-row">
        <div class="half-width">
          <label>From:</label>
          <select id="startCity">
            <option value="Kraków, 30-001">Kraków</option>
            <option value="Katowice, 40-001">Katowice</option>
            <option value="Warsaw, 00-002">Warsaw</option>
          </select>
        </div>
        <div class="half-width">
          <label>To:</label>
          <select id="endCity">
            <option value="Dąbrowa Górnicza, 41-300">Dąbrowa Górnicza</option>
            <option value="Kraków, 30-001">Kraków</option>
            <option value="Katowice, 40-001">Katowice</option>
          </select>
        </div>
      </div>
    </div>

    <div class="section-box">
      <h3>2. Trip Details</h3>
      <div class="input-group checkbox-group">
        <input type="checkbox" id="roundTrip">
        <label for="roundTrip">Round Trip (Doubles Distance & Tolls)</label>
      </div>

      <div class="input-group">
        <label>Road Conditions (Impacts Fuel):</label>
        <select id="conditions">
          <option value="1.0">Clear / Normal</option>
          <option value="1.15">Heavy City Traffic (+15% Fuel)</option>
          <option value="1.25">Rain / Snow (+25% Fuel)</option>
        </select>
      </div>

      <div class="flex-row input-group">
        <div class="half-width">
          <label>Base Fuel (L/100km):</label>
          <input type="number" id="consumption" value="7.5" step="0.1">
        </div>
        <div class="half-width">
          <label>Fuel Price (PLN):</label>
          <input type="number" id="price" value="6.50" step="0.01">
        </div>
      </div>

      <div class="input-group">
        <label>Total Passengers:</label>
        <input type="number" id="people" value="5" min="1" max="6">
      </div>
    </div>

    <button class="primary-btn" onclick="calculateSplit()">Calculate & Save Trip</button>

    <div id="results" class="hidden section-box results-box">
      <h3>Trip Breakdown:</h3>
      <p>Distance: <span id="resDistance">0</span> km | Tolls: <span id="resTolls">0</span> PLN</p>
      <hr>
      <p>True Trip Cost: <span id="totalCost">0.00</span> PLN</p>
      <p class="highlight">Owed Per Person: <span id="perPersonCost">0.00</span> PLN</p>
    </div>

    <div class="section-box" id="history-section">
      <h3>Monthly Expense Tracker</h3>
      <div class="flex-row align-center">
        <input type="month" id="monthSelector">
        <button class="secondary-btn" onclick="calculateMonthly()">Check Month</button>
      </div>
      <p id="monthlyResult" class="monthly-total hidden">Total spent in selected month: <span>0.00 PLN</span></p>
      
      <h4 style="margin-top: 15px;">Recent Trips</h4>
      <ul id="historyList"></ul>
      <button class="danger-btn" onclick="clearHistory()">Clear All History</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
